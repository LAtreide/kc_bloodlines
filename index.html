<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bloodline Attribute Finder</title>
<style>
/* ----------------- Base ----------------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #fff;
    padding: 30px;
    overflow-x: hidden;
}

h1 {
    margin-top: 0;
    font-weight: 700;
    font-size: 2em;
    color: #e63946; /* rojo oscuro elegante */
    text-shadow: 0 0 8px #e6394666;
}

p {
    color: #aaa;
}

/* ----------------- Layout ----------------- */
.container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.filters {
    min-width: 220px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    transition: all 0.3s;
}

label {
    display: block;
    margin: 10px 0;
    cursor: pointer;
    font-weight: 500;
    transition: color 0.3s;
}
label:hover {
    color: #e63946;
}

.results {
    flex-grow: 1;
    min-width: 300px;
}

/* ----------------- Cards ----------------- */
.card {
    background: linear-gradient(145deg, #1a1a1a, #2b2b2b);
    padding: 16px 20px;
    border-radius: 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.4s, box-shadow 0.4s, opacity 0.4s;
    opacity: 0;
    transform: translateY(20px);
}
.card.show {
    opacity: 1;
    transform: translateY(0);
}
.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 28px rgba(0,0,0,0.7);
    background: linear-gradient(145deg, #2b2b2b, #3c3c3c);
}

.card strong {
    font-size: 1.2em;
    color: #e63946;
    text-shadow: 0 0 6px #e6394666;
}

/* ----------------- Attributes ----------------- */
.attributes {
    font-size: 0.9em;
    color: #bbb;
    margin-top: 8px;
}

.attributes .attr {
    cursor: pointer;
    text-decoration: underline;
    margin-right: 8px;
    display: inline-block;
    padding: 2px 6px;
    border-radius: 6px;
    transition: all 0.3s;
}
.attributes .attr:hover {
    background: #e6394622;
    color: #e63946;
    transform: scale(1.2);
}
.attributes .attr.active {
    background: #e6394644;
    color: #e63946;
}

/* ----------------- Animation ----------------- */
@keyframes fadeSlideUp {
    0% {opacity:0; transform: translateY(20px);}
    100% {opacity:1; transform: translateY(0);}
}
</style>
</head>
<body>

<h1>Bloodline Attribute Finder</h1>
<p>Select attributes to filter bloodlines.</p>

<div class="container">

<div class="filters">
<h3>Attributes</h3>
<label><input type="checkbox" value="physique"> Physique</label>
<label><input type="checkbox" value="intelligence"> Intelligence</label>
<label><input type="checkbox" value="liveliness"> Liveliness</label>
<label><input type="checkbox" value="obedience"> Obedience</label>
<label><input type="checkbox" value="friendliness"> Friendliness</label>
</div>

<div class="results">
<h3>Bloodlines</h3>
<div id="results"></div>
</div>

</div>

<script>
const bloodlines = [
  { name: "Dragon Bounty", attributes: ["physique", "friendliness"] },
  { name: "Ballroom", attributes: ["intelligence", "obedience"] },
  { name: "Dragon Island", attributes: ["liveliness", "friendliness"] },
  { name: "Knights Parade", attributes: ["intelligence", "friendliness"] },
  { name: "Negotiation", attributes: ["physique", "obedience"] },
  { name: "War of Conquest", attributes: ["physique", "liveliness"] },
  { name: "Pet Race", attributes: ["intelligence", "physique"] },
  { name: "Texas Hold'em", attributes: ["intelligence", "liveliness"] },
  { name: "Realm Revival", attributes: ["physique", "friendliness"] },
  { name: "Snow Mountain Eploration", attributes: ["physique", "liveliness"] },
  { name: "Royal Mine", attributes: ["liveliness", "friendliness"] },
  { name: "Scarlet Beauty", attributes: ["intelligence", "physique"] },
  { name: "School of Athens", attributes: ["intelligence", "obedience"] },
  { name: "Siege of Undead", attributes: ["obedience", "friendliness"] },
  { name: "Twilight Castle", attributes: ["liveliness", "obedience"] },
  { name: "Uncharted Waters", attributes: ["physique", "liveliness"] },
  { name: "War of the Lions: Supply Reserves", attributes: ["physique", "obedience"] },
  { name: "War of the Lions: Fortress War", attributes: ["intelligence", "friendliness"] },
  { name: "Dragon Treasure Hunt", attributes: ["intelligence", "friendliness"] },
  { name: "Masquerade Ball", attributes: ["intelligence", "liveliness"] },
  { name: "Mystery Murder", attributes: ["liveliness", "obedience"] },
  { name: "Nibelungen Treasure", attributes: ["obedience", "friendliness"] },
  { name: "Throne of the Wolves", attributes: ["physique", "liveliness"] },
  { name: "Shadow of the Warren", attributes: ["intelligence", "obedience"] }
];

const checkboxes = document.querySelectorAll("input[type=checkbox]");
const results = document.getElementById("results");

checkboxes.forEach(cb => cb.addEventListener("change", filter));

function filter() {
  const selected = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);

  let filtered;
  if(selected.length === 0) {
    filtered = bloodlines;
  } else {
    filtered = bloodlines.filter(b => selected.every(attr => b.attributes.includes(attr)));
  }
  display(filtered);
}

function display(list) {
  results.innerHTML = "";
  if(list.length === 0) {
    results.innerHTML = "<p>No bloodlines match.</p>";
    return;
  }

  list.forEach((b, i) => {
    const div = document.createElement("div");
    div.className = "card";

    const attrs = b.attributes.map(attr => `<span class="attr" data-attr="${attr}">${attr}</span>`).join(", ");
    div.innerHTML = `<strong>${b.name}</strong><div class="attributes">${attrs}</div>`;
    results.appendChild(div);

    setTimeout(() => div.classList.add('show'), i * 50);
  });

  const attrSpans = results.querySelectorAll(".attr");
  attrSpans.forEach(span => {
    span.classList.remove("active");
    const cb = document.querySelector(`input[type=checkbox][value="${span.dataset.attr}"]`);
    if(cb.checked) span.classList.add("active");

    span.addEventListener("click", () => {
      const attr = span.dataset.attr;
      const cb = document.querySelector(`input[type=checkbox][value="${attr}"]`);
      if(cb) {
        cb.checked = !cb.checked;
        filter();
      }
    });
  });
}

// mostrar todas al inicio
display(bloodlines);
</script>

</body>
</html>
