<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bloodline Attribute Finder</title>
<style>
/* ================= ANIMACIONES ================= */
@keyframes floatKawaii {
    0%, 100% { transform: translateY(0px) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
}

@keyframes sparkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* ================= BASE NORMAL ================= */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: #fff;
    padding: 30px;
    overflow-x: hidden;
    transition: all 0.6s ease;
}

h1 {
    margin-top: 0;
    font-weight: 700;
    font-size: 2em;
    color: #e63946; /* rojo oscuro elegante */
    text-shadow: 0 0 8px #e6394666;
    transition: all 0.6s ease;
}

p {
    color: #aaa;
    transition: all 0.6s ease;
}

/* ================= LAYOUT ================= */
.container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    transition: all 0.6s ease;
}

.filters {
    min-width: 220px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    transition: all 0.6s ease;
}

label {
    display: block;
    margin: 10px 0;
    cursor: pointer;
    font-weight: 500;
    transition: color 0.3s;
}
label:hover {
    color: #e63946;
}

.results {
    flex-grow: 1;
    min-width: 300px;
    transition: all 0.6s ease;
}

/* ================= CARDS ================= */
.card {
    background: linear-gradient(145deg, #1a1a1a, #2b2b2b);
    padding: 16px 20px;
    border-radius: 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.4s, box-shadow 0.4s, opacity 0.4s, background 0.6s;
    opacity: 0;
    transform: translateY(20px);
}
.card.show {
    opacity: 1;
    transform: translateY(0);
}
.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 28px rgba(0,0,0,0.7);
    background: linear-gradient(145deg, #2b2b2b, #3c3c3c);
}

.card strong {
    font-size: 1.2em;
    color: #e63946;
    text-shadow: 0 0 6px #e6394666;
    transition: all 0.6s ease;
}

/* ================= ATTRIBUTES ================= */
.attributes {
    font-size: 0.9em;
    color: #bbb;
    margin-top: 8px;
    transition: all 0.6s ease;
}

.attributes .attr {
    cursor: pointer;
    text-decoration: underline;
    margin-right: 8px;
    display: inline-block;
    padding: 2px 6px;
    border-radius: 6px;
    transition: all 0.3s;
}
.attributes .attr:hover {
    background: #e6394622;
    color: #e63946;
    transform: scale(1.2);
}
.attributes .attr.active {
    background: #e6394644;
    color: #e63946;
}

/* ================= PINKIFY MODE ================= */
body.pinkified {
    background: linear-gradient(135deg, #fff5f8, #ffe5ef) !important;
    color: #8b3a62 !important;
}

body.pinkified h1 {
    color: #ff69b4 !important;
    font-size: 2.4em !important;
    text-shadow: 0 0 20px #ff69b455, 0 0 40px #ffb6e755 !important;
    animation: heartbeat 1.2s infinite;
}

body.pinkified h3 {
    color: #ff1493 !important;
    font-size: 1.3em !important;
    text-shadow: 0 0 10px #ff69b455 !important;
}

body.pinkified p {
    color: #d946ef !important;
    font-weight: 600 !important;
    font-size: 1.1em !important;
}

body.pinkified .container {
    gap: 40px !important;
}

body.pinkified .filters {
    background: linear-gradient(145deg, rgba(255, 105, 180, 0.15), rgba(255, 182, 193, 0.2)) !important;
    border: 3px solid #ff69b4 !important;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.4), inset 0 0 10px rgba(255, 192, 203, 0.3) !important;
    backdrop-filter: blur(12px) !important;
    border-radius: 30px !important;
}

body.pinkified .filters label {
    color: #d946ef !important;
    font-weight: 700 !important;
    font-size: 1.05em !important;
    text-shadow: 0 0 5px #ff69b444 !important;
}

body.pinkified .filters label:hover {
    color: #ff1493 !important;
    transform: scale(1.15) !important;
}

body.pinkified input[type="checkbox"] {
    width: 20px !important;
    height: 20px !important;
    accent-color: #ff69b4 !important;
    cursor: pointer !important;
}

body.pinkified .card {
    background: linear-gradient(145deg, rgba(255,192,203, 0.9), rgba(255, 182, 193, 0.8)) !important;
    box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4), 0 0 20px rgba(255, 182, 193, 0.3) !important;
    border: 2px solid #ff69b4 !important;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    position: relative !important;
}

body.pinkified .card::before {
    content: '✨';
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 1.5em;
    animation: sparkle 2s infinite;
}

body.pinkified .card:hover {
    transform: translateY(-15px) scale(1.05) rotate(2deg) !important;
    box-shadow: 0 15px 40px rgba(255, 105, 180, 0.6), 0 0 30px rgba(255, 182, 193, 0.5) !important;
}

body.pinkified .card strong {
    color: #ff1493 !important;
    font-size: 1.35em !important;
    text-shadow: 0 0 10px #ff69b455, 0 0 20px #ffb6e755 !important;
}

body.pinkified .attributes {
    color: #d946ef !important;
    font-weight: 600 !important;
}

body.pinkified .attributes .attr {
    background: linear-gradient(145deg, #ffb6d9, #ffc0cb) !important;
    color: #ff1493 !important;
    border: 1px solid #ff69b4 !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3) !important;
}

body.pinkified .attributes .attr:hover {
    background: linear-gradient(145deg, #ff69b4, #ff1493) !important;
    color: white !important;
    transform: scale(1.3) rotate(-5deg) !important;
    box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6) !important;
}

body.pinkified .attributes .attr.active {
    background: linear-gradient(145deg, #ff1493, #c71585) !important;
    color: white !important;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.8) !important;
}

/* ================= PINKIFY BUTTON ================= */
.pinkify-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(145deg, #ff69b4, #ff1493);
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 1.1em;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
}

.pinkify-btn:hover {
    transform: scale(1.1) translateY(-3px);
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
}

.pinkify-btn:active {
    transform: scale(0.95);
}

body.pinkified .pinkify-btn {
    background: linear-gradient(145deg, #c71585, #8b008b);
    animation: heartbeat 1.2s infinite;
}

/* ================= DECORATIVE CATS ================= */
.kawaii-cat {
    position: fixed;
    font-size: 3em;
    animation: floatKawaii 3s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
    transition: opacity 0.6s ease;
    visibility: hidden;
}

body.pinkified .kawaii-cat {
    opacity: 0.85;
    font-size: 4em;
    filter: drop-shadow(0 6px 12px rgba(255, 105, 180, 0.4));
    visibility: visible;
}

.cat1 {
    bottom: 50px;
    left: 30px;
    animation-delay: 0s;
}

.cat2 {
    top: 200px;
    right: 40px;
    animation-delay: 1s;
}

.cat3 {
    bottom: 150px;
    right: 100px;
    animation-delay: 2s;
}

.sparkles {
    position: fixed;
    font-size: 1.5em;
    opacity: 0;
    pointer-events: none;
    animation: sparkle 2s ease-in-out infinite;
    transition: opacity 0.6s ease;
    visibility: hidden;
}

body.pinkified .sparkles {
    opacity: 0.9;
    animation: sparkle 1.5s ease-in-out infinite;
    visibility: visible;
}

.sparkle1 {
    top: 50px;
    left: 50%;
    animation-delay: 0s;
}

.sparkle2 {
    bottom: 200px;
    left: 20%;
    animation-delay: 0.5s;
}

.sparkle3 {
    top: 300px;
    right: 10%;
    animation-delay: 1s;
}

.sparkle4 {
    bottom: 50px;
    right: 20%;
    animation-delay: 1.5s;
}

@keyframes fadeSlideUp {
    0% {opacity:0; transform: translateY(20px);}
    100% {opacity:1; transform: translateY(0);}
}
</style>
</head>
<body>

<!-- PINKIFY BUTTON -->
<button class="pinkify-btn" id="pinkifyBtn">🌸 PINKIFY 🌸</button>

<!-- DECORATIVE ELEMENTS -->
<div class="kawaii-cat cat1">🐱</div>
<div class="kawaii-cat cat2">😸</div>
<div class="kawaii-cat cat3">🐈‍⬛</div>

<div class="sparkles sparkle1">✨</div>
<div class="sparkles sparkle2">💖</div>
<div class="sparkles sparkle3">🌸</div>
<div class="sparkles sparkle4">💕</div>

<h1>Bloodline Attribute Finder</h1>
<p>Select attributes to filter bloodlines.</p>

<div class="container">

<div class="filters">
<h3>Attributes</h3>
<label><input type="checkbox" value="physique"> Physique</label>
<label><input type="checkbox" value="intelligence"> Intelligence</label>
<label><input type="checkbox" value="liveliness"> Liveliness</label>
<label><input type="checkbox" value="obedience"> Obedience</label>
<label><input type="checkbox" value="friendliness"> Friendliness</label>
</div>

<div class="results">
<h3>Bloodlines</h3>
<div id="results"></div>
</div>

</div>

<script>
const bloodlines = [
  { name: "Dragon Bounty", attributes: ["physique", "friendliness"] },
  { name: "Ballroom", attributes: ["intelligence", "obedience"] },
  { name: "Dragon Island", attributes: ["liveliness", "friendliness"] },
  { name: "Knights Parade", attributes: ["intelligence", "friendliness"] },
  { name: "Negotiation", attributes: ["physique", "obedience"] },
  { name: "War of Conquest", attributes: ["physique", "liveliness"] },
  { name: "Pet Race", attributes: ["intelligence", "physique"] },
  { name: "Texas Hold'em", attributes: ["intelligence", "liveliness"] },
  { name: "Realm Revival", attributes: ["physique", "friendliness"] },
  { name: "Snow Mountain Eploration", attributes: ["physique", "liveliness"] },
  { name: "Royal Mine", attributes: ["liveliness", "friendliness"] },
  { name: "Scarlet Beauty", attributes: ["intelligence", "physique"] },
  { name: "School of Athens", attributes: ["intelligence", "obedience"] },
  { name: "Siege of Undead", attributes: ["obedience", "friendliness"] },
  { name: "Twilight Castle", attributes: ["liveliness", "obedience"] },
  { name: "Uncharted Waters", attributes: ["physique", "liveliness"] },
  { name: "War of the Lions: Supply Reserves", attributes: ["physique", "obedience"] },
  { name: "War of the Lions: Fortress War", attributes: ["intelligence", "friendliness"] },
  { name: "Dragon Treasure Hunt", attributes: ["intelligence", "friendliness"] },
  { name: "Masquerade Ball", attributes: ["intelligence", "liveliness"] },
  { name: "Mystery Murder", attributes: ["liveliness", "obedience"] },
  { name: "Nibelungen Treasure", attributes: ["obedience", "friendliness"] },
  { name: "Throne of the Wolves", attributes: ["physique", "liveliness"] },
  { name: "Shadow of the Warren", attributes: ["intelligence", "obedience"] }
];

const checkboxes = document.querySelectorAll("input[type=checkbox]");
const results = document.getElementById("results");
const pinkifyBtn = document.getElementById("pinkifyBtn");

// PINKIFY MODE TOGGLE
pinkifyBtn.addEventListener("click", () => {
  document.body.classList.toggle("pinkified");
  pinkifyBtn.textContent = document.body.classList.contains("pinkified") 
    ? "🖤 BACK TO DARK, AS MY SOUL 🖤" 
    : "🌸 PINKIFY 🌸";
  
  // Add sparkle effect on button click
  if(document.body.classList.contains("pinkified")) {
    createConfetti();
  }
});

// Create confetti effect
function createConfetti() {
  const confettiPieces = ['🌸', '💖', '💕', '✨', '😸', '🐱'];
  for(let i = 0; i < 20; i++) {
    const piece = document.createElement("div");
    piece.textContent = confettiPieces[Math.floor(Math.random() * confettiPieces.length)];
    piece.style.position = "fixed";
    piece.style.left = Math.random() * window.innerWidth + "px";
    piece.style.top = "-50px";
    piece.style.fontSize = (Math.random() * 1 + 1.5) + "em";
    piece.style.opacity = "1";
    piece.style.pointerEvents = "none";
    piece.style.zIndex = "999";
    piece.style.animation = `fall ${2 + Math.random() * 1}s linear forwards`;
    document.body.appendChild(piece);
    
    setTimeout(() => piece.remove(), 3000);
  }
}

// Add keyframe animation for confetti
const style = document.createElement('style');
style.textContent = `
  @keyframes fall {
    to {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }
`;
document.head.appendChild(style);

checkboxes.forEach(cb => cb.addEventListener("change", filter));

function filter() {
  const selected = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);

  let filtered;
  if(selected.length === 0) {
    filtered = bloodlines;
  } else {
    filtered = bloodlines.filter(b => selected.every(attr => b.attributes.includes(attr)));
  }
  display(filtered);
}

function display(list) {
  results.innerHTML = "";
  if(list.length === 0) {
    results.innerHTML = "<p>No bloodlines match.</p>";
    return;
  }

  list.forEach((b, i) => {
    const div = document.createElement("div");
    div.className = "card";

    const attrs = b.attributes.map(attr => `<span class="attr" data-attr="${attr}">${attr}</span>`).join(", ");
    div.innerHTML = `<strong>${b.name}</strong><div class="attributes">${attrs}</div>`;
    results.appendChild(div);

    setTimeout(() => div.classList.add('show'), i * 50);
  });

  const attrSpans = results.querySelectorAll(".attr");
  attrSpans.forEach(span => {
    span.classList.remove("active");
    const cb = document.querySelector(`input[type=checkbox][value="${span.dataset.attr}"]`);
    if(cb.checked) span.classList.add("active");

    span.addEventListener("click", () => {
      const attr = span.dataset.attr;
      const cb = document.querySelector(`input[type=checkbox][value="${attr}"]`);
      if(cb) {
        cb.checked = !cb.checked;
        filter();
      }
    });
  });
}

// mostrar todas al inicio
display(bloodlines);
</script>

</body>
</html>
